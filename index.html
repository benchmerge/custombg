<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>benchmerge</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
        }
        video {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            min-width: 100%;
            min-height: 100%;
            width: auto;
            height: auto;
            object-fit: cover;
        }
    </style>
</head>
<body>
    <video id="player" autoplay muted loop playsinline></video>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const videoSrc = urlParams.get('v');
        if (videoSrc) {
            const player = document.getElementById('player');
            player.src = videoSrc;
        }
    </script>
</body>
</html>
