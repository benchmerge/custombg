<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>benchmerge</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
        }
        video {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100vw;
            height: 100vh;
            object-fit: cover;
        }
    </style>
</head>
<body>
    <video id="player" autoplay muted loop playsinline></video>
    <script>
        const fullQuery = window.location.search;
        const vIndex = fullQuery.indexOf('v=');
        
        if (vIndex !== -1) {
            const videoSrc = fullQuery.substring(vIndex + 2);
            const player = document.getElementById('player');
            player.src = decodeURIComponent(videoSrc);
        }
    </script>
</body>
</html>
