<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>benchmerge</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        #content {
            width: 100vw;
            height: 100vh;
            object-fit: cover;
        }
    </style>
</head>
<body>
    <div id="container"></div>

    <script>
        const urlParams = new URL(window.location.href).searchParams;
        const rawSrc = window.location.search.split('v=')[1];
        
        if (rawSrc) {
            const src = decodeURIComponent(rawSrc);
            const container = document.getElementById('container');
            
            const imageExtensions = ['.jpg', '.jpeg', '.png', '.gif', '.webp', '.bmp'];
            const isImage = imageExtensions.some(ext => src.toLowerCase().includes(ext));

            if (isImage) {
                const img = document.createElement('img');
                img.src = src;
                img.id = 'content';
                container.appendChild(img);
            } else {
                const video = document.createElement('video');
                video.src = src;
                video.id = 'content';
                video.autoplay = true;
                video.muted = true;
                video.loop = true;
                video.setAttribute('playsinline', '');
                container.appendChild(video);
            }
        }
    </script>
</body>
</html>
